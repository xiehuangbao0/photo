<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链浏览器 - 光影存证</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/photo-style.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换深色/浅色模式">🌙</button>

    <nav class="navbar navbar-inverse">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#navbar">
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="index.html">
                    <span class="logo-icon">✨</span>
                    <span class="logo-text">光影存证</span>
                </a>
            </div>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="nav navbar-nav">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="ranking.html">人气榜</a></li>
                    <li><a href="winners.html">获奖展厅</a></li>
                    <li><a href="market.html">版权集市</a></li>
                    <li><a href="publish.html">我要投稿</a></li>
                    <li><a href="blockchain.html">链上查询</a></li>
                    <li><a href="about.html">平台介绍</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right" id="guestMenu">
                    <li><a href="login.html" class="login-btn">登录</a></li>
                    <li><a href="register.html" class="register-btn">注册</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right" id="loginMenu" style="display:none;">
                    <li><span class="navbar-text text-white">欢迎：<span id="showNick"></span></span></li>
                    <li><a href="person-info.html">个人中心</a></li>
                    <li><button class="btn btn-danger btn-xs navbar-btn" id="logoutBtn">退出登录</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="notification-banner">
        <div class="notification-scroll" id="notificationContent"></div>
    </div>

    <div class="container main-content">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h2 class="text-center">🔗 区块链浏览器</h2>
            </div>
            <div class="panel-body">
                <div class="row text-center mb-4">
                    <div class="col-md-3">
                        <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;">
                            <div class="stat-icon">📦</div>
                            <div class="fs-3" id="blockCount">0</div>
                            <div class="text-white opacity-80">区块总数</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;">
                            <div class="stat-icon">✅</div>
                            <div class="fs-3" id="validCount">0</div>
                            <div class="text-white opacity-80">已上链作品</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%) !important;">
                            <div class="stat-icon">⏳</div>
                            <div class="fs-3" id="pendingCount">0</div>
                            <div class="text-white opacity-80">待上链作品</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;">
                            <div class="stat-icon">🔐</div>
                            <div class="fs-3" id="txCount">0</div>
                            <div class="text-white opacity-80">交易总数</div>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <input type="text" id="blockSearch" class="form-control" placeholder="搜索区块高度、交易哈希、钱包地址">
                    <button class="btn btn-primary mt-2" id="searchBtn">🔍 查询</button>
                </div>

                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4>📋 区块列表</h4>
                    </div>
                    <div class="panel-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>区块高度</th>
                                    <th>区块哈希</th>
                                    <th>上一区块</th>
                                    <th>交易数</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="blockList"></tbody>
                        </table>
                    </div>
                </div>

                <div class="panel panel-default" id="blockDetail" style="display:none;">
                    <div class="panel-heading">
                        <h4>📦 区块详情 - <span id="detailHeight"></span></h4>
                    </div>
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>区块哈希</label>
                                    <input type="text" class="form-control" id="detailHash" readonly>
                                </div>
                                <div class="form-group">
                                    <label>上一区块哈希</label>
                                    <input type="text" class="form-control" id="detailPrevHash" readonly>
                                </div>
                                <div class="form-group">
                                    <label>时间戳</label>
                                    <input type="text" class="form-control" id="detailTime" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Nonce</label>
                                    <input type="text" class="form-control" id="detailNonce" readonly>
                                </div>
                                <div class="form-group">
                                    <label>交易数</label>
                                    <input type="text" class="form-control" id="detailTxCount" readonly>
                                </div>
                                <div class="form-group">
                                    <label>Merkle根</label>
                                    <input type="text" class="form-control" id="detailMerkle" readonly>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <h5>📝 交易列表</h5>
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>交易哈希</th>
                                        <th>发送方</th>
                                        <th>接收方</th>
                                        <th>类型</th>
                                        <th>数据</th>
                                    </tr>
                                </thead>
                                <tbody id="detailTransactions"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>2026光影存证 · 摄影作品投票存证平台 让每一束光都有据可查</p>
        </div>
    </footer>

    <script src="js/jquery-1.11.3.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/web3.min.js"></script>
    <script src="js/web3-connector.js"></script>
    <script src="js/user.js"></script>
    <script src="js/blockchain.js?v=1.2.0"></script>
    <script src="js/app.js?v=1.3.4"></script>
</body>
</html>
